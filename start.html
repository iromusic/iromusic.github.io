<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width,initial-scale=1.0" name="viewport">
    <title>IROMUSIC</title>
    <meta content="noindex, nofollow" name="robots">
    <meta name="theme-color" content="#2a303b">
    <link rel="mask-icon" href="files/icons/icon-192.png" color="#2a303b">
    <meta name="msapplication-TileColor" content="#2a303b">
    <style>
        body {
            background: #2a303b;
        }
    </style>
</head>
<body>
<script>
    window.onload = function () {
        if (getPlatform() !== 'windows') {
            fetch('/version.json?time=' + Date.now().toLocaleString())
                .then(response => {
                    if (!response.success) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    window.location = data.location;
                })
                .catch(error => {
                    window.location = 'https://iro.mobi/app';
                });
        }
    }

    function getPlatform() {
        const platform = navigator.platform;
        switch (platform) {
            case 'MacIntel':
            case 'MacPPC':
                return 'mac';
            case 'Win32':
            case 'Win64':
                return 'windows';
            case 'Linux i686':
            case 'Linux x86_64':
                return 'linux';
            case 'Android':
                return 'android';
            case 'iPad':
                return 'ipad';
            case 'iPhone':
                return 'iphone';
            case 'iPod':
                return 'ipod';
            default:
                return '';
        }
    }

</script>
</body>
</html>
